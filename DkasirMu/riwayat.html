<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat - DKasirMu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Riwayat</h2>
    <a href="index.html">← Kembali ke Kasir</a>

    <!-- REKAP SESI -->
    <div id="rekap-sesi">
        <h3>Rekap Sesi Kasir</h3>
        <table id="tabel-sesi">
            <thead>
                <tr>
                    <th>Waktu Buka</th>
                    <th>Waktu Tutup</th>
                    <th>Jml Transaksi</th>
                    <th>Total Pendapatan</th>
                </tr>
            </thead>
            <tbody id="isi-sesi"></tbody>
        </table>
    </div>

    <!-- RIWAYAT TRANSAKSI -->
    <div id="riwayat-transaksi">
        <h3>Riwayat Transaksi</h3>
        <input type="date" id="filter-tanggal">
        <button onclick="filterTransaksi()">Tampilkan</button>
        <table id="tabel-transaksi">
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Bayar</th>
                    <th>Kembalian</th>
                </tr>
            </thead>
            <tbody id="isi-transaksi"></tbody>
        </table>
    </div>

    <script type="module" src="js/riwayat.js"></script>
</body>
</html>
